name: marx_app
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  drift: ^2.18.0
  drift_flutter: ^0.2.4
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.4
  path: ^1.9.0
  shared_preferences: ^2.2.3
  google_fonts: ^6.2.1
  go_router: ^14.2.7
  home_widget: ^0.7.0+1
  workmanager: ^0.9.0+3
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4
  share_plus: ^10.0.2
  screenshot: ^3.0.0
  flutter_tts: ^4.2.0
  pdf: ^3.11.0
  printing: ^5.13.0
  cached_network_image: ^3.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  riverpod_generator: ^2.4.3
  build_runner: ^2.4.11
  drift_dev: ^2.18.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/branding/app_icon.png
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/
